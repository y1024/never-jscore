name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: full
  GH_ACTIONS: 1

jobs:
  # macOS
  build_wheels_macos:
    name: Build macOS wheels (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ['3.11']
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Configure git (disable submodule recursion for cargo git deps)
        run: git config --global fetch.recurseSubmodules false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: brew install cmake pkg-config || true

      - name: Download V8 prebuilt (simdutf)
        run: |
          ARCH=${{ matrix.target }}
          FILE="librusty_v8_simdutf_release_${ARCH}.a"
          curl -fL "https://github.com/denoland/rusty_v8/releases/download/v147.0.0/${FILE}.gz" \
            -o "${FILE}.gz"
          gzip -d -k "${FILE}.gz"
          echo "RUSTY_V8_ARCHIVE=$GITHUB_WORKSPACE/${FILE}" >> $GITHUB_ENV

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.target }}-${{ matrix.python-version }}
          cache-on-failure: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist -i python${{ matrix.python-version }}
          sccache: 'true'
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.12'
          V8_FROM_SOURCE: '0'
          RUSTY_V8_ARCHIVE: ${{ env.RUSTY_V8_ARCHIVE }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}-wheels-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  # Linux
  # manylinux_2_28 is a stable modern baseline for PyPI wheels.
  # On Linux we build V8 from source because the prebuilt static archive uses
  # local-exec TLS relocations that cannot be linked into the Python extension
  # shared object.
  build_wheels_linux:
    name: Build Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.11']
        target:
          - x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          args: --release --locked --strip --compatibility pypi --out dist -i python${{ matrix.python-version }}
          before-script-linux: |
            git config --global fetch.recurseSubmodules false

            # Build V8 from source on Linux instead of linking the prebuilt archive.
            # The prebuilt static archive carries local-exec TLS relocations
            # (R_X86_64_TPOFF32), which cannot be linked into the Python extension
            # shared object. We force a PIC + initial-exec TLS model for the V8 GN
            # compile step through Chromium's cc_wrapper hook.
            dnf install -y gcc gcc-c++ binutils clang-devel glib2-devel openssl-devel perl-IPC-Cmd pkg-config cmake

            cat > /tmp/v8-cc-wrapper.sh <<'EOF'
            #!/bin/sh
            compiler="$1"
            shift
            exec "$compiler" -fPIC -ftls-model=initial-exec "$@"
            EOF
            chmod +x /tmp/v8-cc-wrapper.sh

            echo "=== Build Environment ==="
            cat /etc/os-release
            echo "/usr/bin/gcc: $(/usr/bin/gcc --version | head -1)"
            echo "/usr/bin/clang: $(/usr/bin/clang --version | head -1)"
            echo "/usr/bin/ld: $(/usr/bin/ld --version | head -1)"
            ls -l /usr/bin/gcc /usr/bin/clang /usr/bin/ld /tmp/v8-cc-wrapper.sh
            echo "libclang: $(ls -1 /usr/lib64/libclang.so* | head -1)"
        env:
          V8_FROM_SOURCE: '1'
          EXTRA_GN_ARGS: 'cc_wrapper="/tmp/v8-cc-wrapper.sh"'
          LIBCLANG_PATH: /usr/lib64
          PRINT_GN_ARGS: '1'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}-wheels-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  # sdist
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Release
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs:
      - build_wheels_macos
      - build_wheels_linux
      - build_sdist
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all files
        run: ls -lah dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
