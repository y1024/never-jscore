name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: full
  GH_ACTIONS: 1

jobs:
  # macOS
  build_wheels_macos:
    name: Build macOS wheels (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ['3.11']
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Configure git (disable submodule recursion for cargo git deps)
        run: git config --global fetch.recurseSubmodules false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: brew install cmake pkg-config || true

      - name: Download V8 prebuilt (simdutf)
        run: |
          ARCH=${{ matrix.target }}
          FILE="librusty_v8_simdutf_release_${ARCH}.a"
          curl -fL "https://github.com/denoland/rusty_v8/releases/download/v147.0.0/${FILE}.gz" \
            -o "${FILE}.gz"
          gzip -d -k "${FILE}.gz"
          echo "RUSTY_V8_ARCHIVE=$GITHUB_WORKSPACE/${FILE}" >> $GITHUB_ENV

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.target }}-${{ matrix.python-version }}
          cache-on-failure: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist -i python${{ matrix.python-version }}
          sccache: 'true'
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.12'
          V8_FROM_SOURCE: '0'
          RUSTY_V8_ARCHIVE: ${{ env.RUSTY_V8_ARCHIVE }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}-wheels-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  # ─── Linux ────────────────────────────────────────────────────────────────
  # manylinux_2_28 (AlmaLinux 8, glibc 2.28+)
  # 使用 lld 链接器: V8 预编译库带有 local-exec TLS 重定位 (R_X86_64_TPOFF32),
  #   GNU ld 拒绝将其链入共享库, 但 lld 可以正确处理
  build_wheels_linux:
    name: Build Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
        target:
          - x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Download V8 prebuilt (simdutf)
        run: |
          ARCH=${{ matrix.target }}
          FILE="librusty_v8_simdutf_release_${ARCH}.a"
          curl -fL "https://github.com/denoland/rusty_v8/releases/download/v147.0.0/${FILE}.gz" \
            -o "${FILE}.gz"
          gzip -d -k "${FILE}.gz"
          echo "RUSTY_V8_ARCHIVE=$GITHUB_WORKSPACE/${FILE}" >> $GITHUB_ENV

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          args: --release --strip --out dist -i python${{ matrix.python-version }}
          before-script-linux: |
            git config --global fetch.recurseSubmodules false

            # clang + lld: 替代 GNU ld 解决 V8 TLS 重定位问题
            # openssl-devel: deno_tls/deno_fetch
            # perl-IPC-Cmd: ring crate
            dnf install -y clang lld openssl-devel perl-IPC-Cmd pkg-config cmake

            # 关键: env: 块的变量不传入 Docker 容器, 必须在此 export
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export RUSTFLAGS="-C link-arg=-fuse-ld=lld"

            echo "=== Build Environment ==="
            echo "clang: $(clang --version | head -1)"
            echo "lld: $(lld --version 2>&1 | head -1)"
        env:
          V8_FROM_SOURCE: '0'
          RUSTY_V8_ARCHIVE: ${{ env.RUSTY_V8_ARCHIVE }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}-wheels-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  # sdist
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Release
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs:
      - build_wheels_macos
      - build_wheels_linux
      - build_sdist
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all files
        run: ls -lah dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
